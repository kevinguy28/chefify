{% extends 'main.html' %}

{% block content %}
<style>
    .home-container{
        display:grid;
        grid-template-columns: 1fr 3fr 3fr;
    }
</style>

<div class="home-container">
    <div>
        <h1>Categories</h1>
        <hr>
        <div>
            <a href="{% url 'home' %}">All</a>
        </div>
        {% for category in categories %}
            <div>
                <a href="{% url 'home' %}?q={{category.name}}">{{category.name}}</a>
            </div>
        {% endfor %}
    </div>
    <div>
        <h1>Community Recipes</h1>
        <hr>
        {% for recipe in c_recipe %}
            <h2><a href="{% url 'community-recipe-room' recipe.id %}">{{recipe.name}}</a></h2>
        {% endfor %}
    </div>
    <div>
        <h1>Your Recipes </h1>
        <hr>
        <a href="{% url 'add-recipe' %}">Add Recipe</a>
        <a href="{% url 'add-ingredient' %}">Add Ingredient</a>
    </div>
</div>

{% endblock content %}
